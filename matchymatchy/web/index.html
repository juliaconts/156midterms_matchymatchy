<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="matchymatchy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>matchymatchy</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Pre-load all SFX into Web Audio API buffers
  const _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const _buffers = {};

  async function loadSound(name, url) {
    const res = await fetch(url);
    const buf = await res.arrayBuffer();
    _buffers[name] = await _audioCtx.decodeAudioData(buf);
  }

  async function initSounds() {
    await Promise.all([
      loadSound('flip',  'assets/sounds/cardflip.mp3'),
      loadSound('match', 'assets/sounds/matched.mp3'),
      loadSound('wrong', 'assets/sounds/faaah.mp3'),
      loadSound('win',   'assets/sounds/yippee-tbh.mp3'),
      loadSound('lose',  'assets/sounds/downer_noise.mp3'),
      loadSound('button', 'assets/sounds/button-click.mp3'),
      loadSound('clock-tick', 'assets/sounds/clock-tick.mp3')
    ]);
  }

  function playSound(name) {
    if (!_buffers[name]) return;
    const source = _audioCtx.createBufferSource();
    source.buffer = _buffers[name];
    source.connect(_audioCtx.destination);
    source.start(0);
  }

  function resumeAudioContext() {
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
  }

  initSounds();
  </script>
</body>
</html>
